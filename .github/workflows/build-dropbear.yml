name: Build Dropbear (Ribbons Deep Debug)

on:
  workflow_dispatch:

jobs:
  build-dropbear:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 📦 Checkout Repo
      uses: actions/checkout@v4

    - name: 📦 Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential autoconf automake libtool pkg-config curl unzip file

    - name: 🤖 Install Android NDK r27c
      run: |
        cd $HOME
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        unzip -q android-ndk-r27c-linux.zip

    - name: 📥 Clone and Auto-Detect Build Method
      run: |
        git clone --depth 1 https://github.com/ribbons/android-dropbear.git $HOME/ribbons-build
        cd $HOME/ribbons-build
        
        # NDK પાથ સેટઅપ
        DETECTED_NDK=$(find "$HOME" -maxdepth 1 -type d -name "android-ndk-r27*" | head -n1)
        export ANDROID_NDK_HOME=$DETECTED_NDK
        export NDK=$DETECTED_NDK
        
        echo "=== 🔍 DEBUG: REPO CONTENTS ==="
        ls -la
        
        echo "=== 🏗️ STARTING BUILD PROCESS ==="
        chmod +x build* 2>/dev/null || true
        
        # ડાયનેમિક બિલ્ડ ડિટેક્શન
        if [ -f ./build.sh ]; then
            echo "🟢 Found build.sh, executing..."
            TARGET=aarch64-linux-android ./build.sh
        elif [ -f ./build ]; then
            echo "🟢 Found build script, executing..."
            TARGET=aarch64-linux-android ./build
        elif [ -f ./autogen.sh ]; then
            echo "🟡 Found autogen.sh, running custom config..."
            ./autogen.sh
            ./configure --host=aarch64-linux-android --build=x86_64-pc-linux-gnu --disable-zlib ac_cv_func_getpgrp_void=yes
            make PROGRAMS="dropbear" MULTI=1 -j$(nproc)
        else
            echo "🟡 Standard configure fallback..."
            autoreconf -fi 2>/dev/null || true
            ./configure --host=aarch64-linux-android --build=x86_64-pc-linux-gnu --disable-zlib ac_cv_func_getpgrp_void=yes
            make -j$(nproc)
        fi

    - name: 📤 Process and Commit
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p bin
        
        echo "=== 🔍 DEBUG: SEARCHING FOR GENERATED BINARIES ==="
        find $HOME/ribbons-build -type f -executable -not -name "*.sh" -not -name "configure" -not -name "autogen" || true
        
        # બાઈનરી શોધીને કોપી કરો
        find $HOME/ribbons-build -name "dropbearmulti" -o -name "dropbear" -o -name "sshd" | head -n 1 | xargs -I {} cp {} bin/sshd_64 || true
        
        if [ -f bin/sshd_64 ]; then
            chmod +x bin/sshd_64
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bin/sshd_64
            git diff-index --quiet HEAD || git commit -m "Update sshd_64 via debug build [$(date +%Y%m%d-%H%M)]"
            git pull --rebase origin main || true
            git push origin main
            echo "✅ Successfully pushed binary to repo!"
        else
            echo "❌ No binary found after compilation. Check 'Clone and Auto-Detect Build Method' step logs above."
            exit 1
        fi
