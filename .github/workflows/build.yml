name: Build Dropbear ARM64 Binary

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-dropbear.yml'

jobs:
  build-dropbear:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    permissions:
      contents: write

    steps:  
    - uses: actions/checkout@v4  

    - name: 📦 Install build dependencies  
      run: |  
        sudo apt-get update  
        sudo apt-get install -y git build-essential autoconf automake libtool pkg-config curl unzip file  

    - name: 🤖 Install Android NDK r27c  
      run: |  
        cd $HOME  
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip  
        unzip -q android-ndk-r27c-linux.zip  
        # 🎯 ફિક્સ: ડાયનેમિક પાથ ડિટેક્શન
        echo "NDK_PATH=$(find "$HOME" -maxdepth 1 -type d -name "android-ndk-r27*" | head -n1)" >> $GITHUB_ENV  

    - name: 📥 Download & Compile Dropbear ARM64  
      run: |  
        git clone --depth 1 https://github.com/mkj/dropbear.git  
        cd dropbear  

        export NDK=$NDK_PATH  
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64  
        export PATH=$TOOLCHAIN/bin:$PATH  
        export TARGET=aarch64-linux-android34  

        export CC=$TOOLCHAIN/bin/$TARGET-clang  
        export CXX=$TOOLCHAIN/bin/$TARGET-clang++  
        export AR=$TOOLCHAIN/bin/llvm-ar  
        export STRIP=$TOOLCHAIN/bin/llvm-strip  
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export CC_FOR_BUILD=gcc

        export CFLAGS="-fPIC -O2"  
        # ⚠️ સાવચેતી: જો સ્ટેટિક લિંકિંગમાં Bionic libc error આપે, તો આ line ખાલી કરી દેવી (LDFLAGS="")
        export LDFLAGS="-static"  

        if [ ! -f configure ]; then
            autoreconf -fi  
        fi

        ./configure --host=aarch64-linux-android \
                    --build=x86_64-pc-linux-gnu \
                    --disable-zlib \
                    --enable-static \
                    ac_cv_func_getpgrp_void=yes  
                    
        make PROGRAMS="dropbear dbclient dropbearkey" STATIC=1 MULTI=1 -j$(nproc)  

        cd ..
        mkdir -p bin
        
        # 🎯 મલ્ટિ-બાઈનરી ફોલબેક લોજિક
        if [ -f dropbear/dropbearmulti ]; then
            $STRIP dropbear/dropbearmulti  
            cp dropbear/dropbearmulti bin/sshd_64  
        elif [ -f dropbear/dropbear ]; then
            $STRIP dropbear/dropbear  
            cp dropbear/dropbear bin/sshd_64  
        else
            echo "❌ No valid binaries found!"
            exit 1
        fi

        chmod +x bin/sshd_64  
        file bin/sshd_64  

    - name: 📤 Commit Binary to Repo  
      run: |  
        git config user.name "github-actions[bot]"  
        git config user.email "github-actions[bot]@users.noreply.github.com"  
        
        if [ -f bin/sshd_64 ]; then
            git add bin/sshd_64  
            git diff-index --quiet HEAD || git commit -m "Update sshd_64 [$(date +%Y%m%d-%H%M)]"
            git pull --rebase origin main || true
            git push origin main
        fi
