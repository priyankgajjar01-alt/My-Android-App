name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    permissions:
      contents: write
      actions: read

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: 🤖 Setup Android Environment from Runner
      run: |
        # ગીટહબ રનરમાં પહેલેથી ઇન્સ્ટોલ કરેલા SDK માંથી NDK 25 કેમ શોધવું તે સેટ કર્યું
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        
        # રનરની અંદર કયા NDK વર્ઝન અવેલેબલ છે તે લિસ્ટ કરીને ઓટો-ડિટેક્ટ કરવું
        AVAILABLE_NDK=$(ls -1 /usr/local/lib/android/sdk/ndk/ | sort -V | grep -v "^27" | tail -n 1)
        if [ -z "$AVAILABLE_NDK" ]; then
          # જો કોઈ જૂનું વર્ઝન ન હોય, તો ડિફોલ્ટ સેટઅપ
          AVAILABLE_NDK="25.2.9519653"
        fi
        
        echo "🎯 Selected Safe NDK Version: $AVAILABLE_NDK"
        echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/$AVAILABLE_NDK" >> $GITHUB_ENV
        echo "ANDROID_NDK_VERSION=$AVAILABLE_NDK" >> $GITHUB_ENV

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython==0.29.33
        pip install --upgrade kivy==2.2.1
        pip install --upgrade python-for-android==2024.1.21

    - name: 🏗️ Build APK
      run: |
        echo "🚀 Building APK using NDK from: $ANDROID_NDK_ROOT"
        
        p4a apk \
          --debug \
          --private . \
          --package=org.ats.remote \
          --name="ATS Remote" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,openssl \
          --permission=INTERNET \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --permission=ACCESS_NETWORK_STATE \
          --arch=arm64-v8a \
          --android-api=34 \
          --sdk-dir=$ANDROID_SDK_ROOT \
          --ndk-dir=$ANDROID_NDK_ROOT \
          --ndk-version=$ANDROID_NDK_VERSION
        
        echo "✅ Build complete!"

    - name: 📦 Find and copy APK
      run: |
        mkdir -p dist
        echo "🔍 Searching for APK..."
        APK=$(find . -maxdepth 10 -name "*.apk" -type f 2>/dev/null | head -n 1)
        
        if [ -z "$APK" ]; then
          echo "❌ APK not found!"
          exit 1
        fi
        
        echo "✅ Found APK: $APK"
        BUILD_DATE=$(date +%Y%m%d-%H%M%S)
        cp "$APK" "dist/ATS-Remote-${BUILD_DATE}.apk"

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ATS-Remote-APK
        path: dist/*.apk
        retention-days: 30

    - name: 💾 Commit APK to repo
      if: success() && github.event_name == 'push'
      run: |
        mkdir -p releases
        cp dist/ATS-Remote-*.apk releases/ 2>/dev/null || true
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add releases/ || true
        git commit -m "Add APK build $(date +%Y-%m-%d)" || true
        git push || true
