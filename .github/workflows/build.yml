name: Build Dropbear (Ribbons Safe Method)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-dropbear.yml'

jobs:
  build-dropbear:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 📦 Checkout Current Repo
      uses: actions/checkout@v4

    - name: 📥 Clone Ribbons Project
      run: git clone --depth 1 https://github.com/ribbons/android-dropbear.git $HOME/ribbons-build

    - name: 🤖 Setup NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        unzip -q android-ndk-r27c-linux.zip
        echo "ANDROID_NDK_HOME=$(find "$HOME" -maxdepth 1 -type d -name "android-ndk-r27*" | head -n1)" >> $GITHUB_ENV

    # 🔍 debug સ્ટેપ: કઈ ફાઈલો છે તે લાઈવ ચેક કરવા માટે
    - name: 🔍 Debug Repo Structure
      run: |
        echo "=== Listing files in ribbons-build ==="
        ls -la $HOME/ribbons-build

    - name: 🏗️ Execute Build Script
      run: |
        cd $HOME/ribbons-build
        export NDK=$ANDROID_NDK_HOME
        
        # જો સ્ક્રિપ્ટનું નામ build.sh કે ખાલી build હોય તો એને પરમિશન આપો
        chmod +x build* 2>/dev/null || true
        
        # જે પણ સાચી બિલ્ડ સ્ક્રિપ્ટ હશે તેને રન કરશે
        if [ -f ./build.sh ]; then
            TARGET=aarch64-linux-android ./build.sh
        elif [ -f ./build ]; then
            TARGET=aarch64-linux-android ./build
        elif [ -f ./Makefile ] || [ -f ./configure ]; then
            echo "⚠️ No build script found, compiling using default make..."
            ./configure --host=aarch64-linux-android && make
        else
            echo "❌ No standard build method detected!"
            exit 1
        fi

    - name: 📤 Process Binaries
      run: |
        mkdir -p bin
        # બિલ્ડ થયા પછી બાઈનરી શોધીને કોપી કરવાનું લોજિક
        find $HOME/ribbons-build -name "dropbearmulti" -o -name "dropbear" -o -name "sshd" | head -n 1 | xargs -I {} cp {} bin/sshd_64 || true
        
        if [ -f bin/sshd_64 ]; then
            chmod +x bin/sshd_64
            file bin/sshd_64
        else
            echo "❌ Binary compilation failed or file not found!"
            exit 1
        fi

    - name: 📤 Commit & Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f bin/sshd_64 ]; then
            git add bin/sshd_64
            git diff-index --quiet HEAD || git commit -m "Update sshd_64 via Ribbons build [$(date +%Y%m%d-%H%M)]"
            git pull --rebase origin main || true
            git push origin main
        fi
        
