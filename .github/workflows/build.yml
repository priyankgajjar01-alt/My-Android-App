name: Build Kivy APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }
      
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - run: sudo apt-get update && sudo apt-get install -y git zip unzip
    - run: pip install --upgrade pip cython==0.29.33 kivy[base] python-for-android==2024.1.21

    - name: Setup SDK
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
        export PATH=$PATH:$HOME/android/sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"

    # 🛠️ મોટો સુધારો ૧: કમાન્ડ 'create' માંથી બદલીને 'apk' કર્યો અને જરૂરી ઓપ્શન્સ સેટ કર્યા
    - name: Build APK
      run: |
        export PATH=$PATH:$HOME/android/sdk/cmdline-tools/latest/bin:$HOME/android/sdk/platform-tools
        export ANDROIDSDK=$HOME/android/sdk
        export ANDROIDNDK=$HOME/android/sdk/ndk/25.1.8937393
        
        p4a apk --debug --package=org.ats.remote --name="ATS Remote" --version=1.0 --bootstrap=sdl2 --requirements=python3,kivy,android --arch=arm64-v8a --android-api=34

    # 🛠️ મોટો સુધારો ૨: નવો કમાન્ડ ફાઇલ સીધી રૂટ ફોલ્ડરમાં બનાવશે એટલે ત્યાંથી જ કોપી થશે
    - name: Copy APK
      run: |
        mkdir -p APK
        APK_PATH=$(find . -maxdepth 2 -name "*.apk" 2>/dev/null | head -n 1)
        
        if [ ! -z "$APK_PATH" ]; then
          echo "🎯 APK મળી ગઈ અહીં: $APK_PATH"
          cp "$APK_PATH" APK/ATS-Remote-$(date +%Y%m%d-%H%M).apk
          echo "✅ APK સફળતાપૂર્વક કોપી થઈ ગઈ છે!"
        else
          echo "❌ હજુ પણ એપીકે બની નથી. નીચેના પ્રોજેક્ટ લોગ્સ જુઓ:"
          ls -la
          exit 1
        fi

    - name: Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add APK/
        git commit -m "Add APK" || true
        git push
        
