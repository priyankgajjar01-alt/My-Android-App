name: Build Dropbear (Ribbons Method)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-dropbear.yml'

jobs:
  build-dropbear:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 📦 Checkout Current Repo
      uses: actions/checkout@v4

    - name: 📥 Clone Ribbons Project
      run: git clone --depth 1 https://github.com/ribbons/android-dropbear.git $HOME/ribbons-build

    - name: 🤖 Setup NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        unzip -q android-ndk-r27c-linux.zip
        echo "ANDROID_NDK_HOME=$(find "$HOME" -maxdepth 1 -type d -name "android-ndk-r27*" | head -n1)" >> $GITHUB_ENV

    - name: 🏗️ Execute Build Script
      run: |
        # Ribbons નો બિલ્ડ સ્ક્રિપ્ટ સીધો જ NDK નો ઉપયોગ કરે છે
        cd $HOME/ribbons-build
        chmod +x build
        # બિલ્ડ સ્ક્રિપ્ટ ARM64 માટે TARGET સેટ કરવો જરૂરી છે
        TARGET=aarch64-linux-android ./build

    - name: 📤 Process Binaries
      run: |
        mkdir -p bin
        # બિલ્ડ થયા પછી bin/ માં ફાઈલ ક્યાં છે તે શોધીને કોપી કરો
        # Ribbons પ્રોજેક્ટ સામાન્ય રીતે build/ યા target/ માં આઉટપુટ આપે છે
        find $HOME/ribbons-build -name "dropbearmulti" -o -name "dropbear" | xargs -I {} cp {} bin/sshd_64
        chmod +x bin/sshd_64

    - name: 📤 Commit & Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add bin/sshd_64
        git diff-index --quiet HEAD || git commit -m "Update sshd_64 via Ribbons build [$(date +%Y%m%d-%H%M)]"
        git pull --rebase origin main || true
        git push origin main
        
