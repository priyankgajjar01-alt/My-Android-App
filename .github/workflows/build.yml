name: Build Android APK with Buildozer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🛠️ સ્ટેપ ૧: ગીટહબ રનર પર લેટેસ્ટ સિસ્ટમ ડિપેન્ડન્સીઝ ઇન્સ્ટોલ કરવી
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libssl-dev libffi-dev cmake python3-dev
          python -m pip install --upgrade pip
          python -m pip install --upgrade buildozer cython virtualenv setuptools wheel

      # 🛠️ સ્ટેપ ૨: જાદુઈ સિમલિંક ટ્રીક સાથે બિલ્ડોઝર રન
      - name: Build Android APK
        env:
          ACCEPT_SDK_LICENSE: "y"
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          # ૧. Buildozer નું લોકલ પ્લેટફોર્મ ફોલ્ડર એડવાન્સમાં ક્રિએટ કર્યું
          mkdir -p ~/.buildozer/android/platform
          
          # ૨. 🚀 સૌથી મહત્વનો સ્ટેપ: ગીટહબના ઑફિશિયલ એન્ડ્રોઇડ SDK ($ANDROID_HOME) ની 
          # સીધી લિંક Buildozer ના ફોલ્ડર સાથે જોડી દીધી!
          ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
          
          # ૩. એન્ડ્રોઇડ રિપોઝીટરી ફાઇલ સેટઅપ
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # ૪. બિલ્ડ સ્ટાર્ટ
          buildozer -v android debug

      # 🛠️ સ્ટેપ ૩: ફાઇનલ APK આર્ટિફેક્ટ અપલોડ કરવું
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ATS-Remote-APK
          path: "**/*.apk"
          
