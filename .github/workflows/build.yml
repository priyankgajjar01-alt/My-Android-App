name: Build Android APK with Buildozer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🛠️ સ્ટેપ ૧: ઑફિશિયલ એન્ડ્રોઇડ SDK ઇન્સ્ટોલ કરવું
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🛠️ સ્ટેપ ૨: બિલ્ડ માટે જરૂરી પ્લેટફોર્મ ટૂલ્સ
      - name: Install Android Build Tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          yes | sdkmanager --licenses

      # 🛠️ સ્ટેપ ૩: સિસ્ટમ ડિપેન્ડન્સીઝ અને મોડ્યુલ્સ ઇન્સ્ટોલ કરવા
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libssl-dev libffi-dev cmake python3-dev
          python -m pip install --upgrade pip
          python -m pip install --upgrade buildozer cython virtualenv setuptools wheel

      # 🛠️ સ્ટેપ ૪: AIDL ફોર્સ-કોપી ટ્રીક સાથે બિલ્ડોઝર રન
      - name: Build Android APK
        env:
          ACCEPT_SDK_LICENSE: "y"
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # 🚀 જાદુઈ ટ્રીક: બિલ્ડોઝરનું હોમ ફોલ્ડર એડવાન્સમાં બનાવીને, ઓફિશિયલ AIDL ત્યાં ફોર્સ-કોપી કરી દીધું!
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/
          cp $ANDROID_SDK_ROOT/build-tools/33.0.2/aidl ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/ 2>/dev/null || true
          
          buildozer -v android debug

      # 🛠️ સ્ટેપ ૫: ફાઇનલ APK આર્ટિફેક્ટ અપલોડ કરવું
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ATS-Remote-APK
          path: "**/*.apk"
          
