name: Build Android Tunnel Receiver APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: FORCE CLEAN
      run: |
        echo "Cleaning old build files..."
        rm -rf .buildozer/ .pytest_cache/ __pycache__/
        rm -rf "$HOME/.local/share/python-for-android/" "$HOME/.cache/pip/" "$HOME/.gradle/"
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27* /usr/local/lib/android/sdk/ndk/28* /usr/local/lib/android/sdk/ndk/29*
        echo "Clean completed."

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip wget curl autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: Setup Android SDK and NDK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        echo "ANDROID_SDK_ROOT=$HOME/android/sdk" >> $GITHUB_ENV
        mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
        cd "$ANDROID_SDK_ROOT/cmdline-tools"
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        rm -rf latest
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin" ]; then
          BIN_PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin"
        else
          BIN_PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
        fi
        echo "$BIN_PATH" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        export PATH="$BIN_PATH:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"

    - name: Install Python packages
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install cython==0.29.33 kivy[base] python-for-android==2024.1.21 websocket-client

    - name: Prepare app source
      run: |
        mkdir -p app_source
        if [ ! -f "main.py" ]; then echo "ERROR: main.py not found!"; exit 1; fi
        cp main.py app_source/main.py
        ls -lh app_source/main.py

    - name: Build Android Tunnel Receiver APK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.1.8937393
        export JAVA_HOME=$JAVA_HOME_17_X64
        export PATH=$JAVA_HOME/bin:$PATH
        python3 -m pythonforandroid.toolchain apk \
          --debug \
          --private app_source \
          --package=com.gai.androidtunnelreceiver \
          --name="Android Tunnel Receiver" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --dist_name=android_tunnel_receiver_dist \
          --requirements=python3,android,kivy,pyjnius,websocket-client,openssl \
          --permission=INTERNET \
          --permission=ACCESS_NETWORK_STATE \
          --permission=ACCESS_WIFI_STATE \
          --permission=MANAGE_EXTERNAL_STORAGE \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --permission=WAKE_LOCK \
          --arch=arm64-v8a \
          --android-api=34 \
          --sdk-dir=$ANDROID_SDK_ROOT \
          --ndk-dir=$ANDROID_NDK_ROOT \
          --ndk-version=25.1.8937393

    - name: Copy APK
      run: |
        mkdir -p APK
        NEW_APK=$(find . -type f -name "*.apk" 2>/dev/null | grep -v "/APK/" | grep -v "/gradle/" | head -n 1)
        if [ -n "$NEW_APK" ]; then
          OUTPUT_NAME="APK/Android-Tunnel-Receiver-$(date +%Y%m%d-%H%M).apk"
          cp "$NEW_APK" "$OUTPUT_NAME"
          ls -lh "$OUTPUT_NAME"
        else
          find . -type f -name "*.apk" -print
          exit 1
        fi

    - name: Push APK to repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git checkout main || git checkout -b main
        git pull origin main --rebase || echo "Nothing to pull"
        git add APK/
        if [ -n "$(git status --porcelain APK/)" ]; then
          git commit -m "Add New Android Tunnel Receiver APK [skip ci]"
          git push origin main
        else
          echo "No new APK changes to commit."
        fi
        
