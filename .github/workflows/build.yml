name: Build APK
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }

      - run: sudo apt update && sudo apt install -y git zip unzip openjdk-17-jdk python3-pip
      - run: pip3 install buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-ndk25.1.8937393

      - name: Setup SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"

      - name: Build APK
        timeout-minutes: 90
        run: buildozer android debug
        env: { ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk }

      - uses: actions/upload-artifact@v4
        with: { name: ATS-APK, path: bin/*.apk }
