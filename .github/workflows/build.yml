Name: Build Photon Clint APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }
      
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    # 🛠️ રામબાણ ઈલાજ: રનરના ડિફોલ્ટ NDK 27/28/29 ને ગ્લોબલ પાથ પરથી જ ઉડાવી દીધા જેથી એ ન નડે!
    - name: 🔥 Force Wipe Global New NDKs
      run: |
        echo "🔥 Wiping incompatible default NDKs from Github Runner..."
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*
        echo "✅ Global clean done!"

    - name: 🤖 Setup SDK & NDK 25.1
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
        export PATH=$PATH:$HOME/android/sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython==0.29.33 kivy[base] python-for-android==2024.1.21

    # 🛠️ નવું સ્ટેપ: જૂની બધી જ સેટિંગ્સ અને જૂની એપનો ડેટા સાફ કરવા માટે
    - name: 🧹 Clean Previous Build Cache & Old Configs
      run: |
        echo "🧹 Cleaning old cache..."
        rm -rf .buildozer/
        rm -f buildozer.spec
        python3 -m pythonforandroid.toolchain clean_all || true
        echo "✅ Clean done!"

    # 🛠️ બિલ્ડ પ્રોસેસ: નવેસરથી ક્લીન બિલ્ડ થશે
    - name: Build APK
      run: |
        export ANDROLLER_SDK_ROOT=$HOME/android/sdk
        export ANDROLLER_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        
        p4a apk --debug --private . \
          --package=org.test.internetstorage \
          --name="Internet Storage Access" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,openssl,android \
          --permission INTERNET \
          --permission READ_EXTERNAL_STORAGE \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission ACCESS_NETWORK_STATE \
          --arch=arm64-v8a \
          --android-api=34 \
          --sdk-dir=$ANDROLLER_SDK_ROOT \
          --ndk-dir=$ANDROLLER_NDK_ROOT \
          --ndk-version=25.1.8937393

    - name: Copy APK
      run: |
        # જૂની બધી એપીકે પહેલા ડિલીટ કરો જેથી નવી જ ફાઈલ પકડે
        rm -rf APK/*
        mkdir -p APK
        APK_PATH=$(find . -maxdepth 2 -name "*.apk" 2>/dev/null | head -n 1)
        
        if [ ! -z "$APK_PATH" ]; then
          echo "🎯 APK મળી ગઈ અહીં: $APK_PATH"
          cp "$APK_PATH" APK/Photon-Clint-$(date +%Y%m%d-%H%M).apk
          echo "✅ APK સફળતાપૂર્વક કોપી થઈ ગઈ છે!"
        else
          echo "❌ હજુ પણ એપીકે બની નથી. નીચેના પ્રોજેક્ટ લોગ્સ જુઓ:"
          ls -la
          exit 1
        fi

    - name: Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add APK/
        git commit -m "Add Photon Clint APK" || true
        git push
        
