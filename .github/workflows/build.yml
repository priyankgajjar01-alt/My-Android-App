name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'zulu', java-version: '17' }

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip openjdk-17-jdk
        pip3 install buildozer cython

    - name: Delete old buildozer cache
      run: rm -rf ~/.buildozer

    - name: Setup Android SDK
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
        export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25b"

    - name: Build APK
      timeout-minutes: 90
      run: buildozer android debug
      env:
        ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk
        ANDROID_HOME: ~/.buildozer/android/platform/android-sdk

    - uses: actions/upload-artifact@v4
      with: { name: ats-apk, path: bin/*.apk }
