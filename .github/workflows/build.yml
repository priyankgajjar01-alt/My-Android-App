name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    permissions:
      contents: write
      actions: read

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: 🤖 Setup Android SDK with NDK 25.1
      run: |
        mkdir -p ~/android/sdk/cmdline-tools
        cd ~/android/sdk/cmdline-tools
        
        echo "📥 Downloading Android Command Line Tools..."
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        
        export PATH=$PATH:~/android/sdk/cmdline-tools/latest/bin
        
        echo "📋 Accepting licenses..."
        yes | sdkmanager --licenses > /dev/null 2>&1
        
        echo "📥 Installing SDK packages..."
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
        
        echo "📥 Installing NDK 25.1..."
        sdkmanager "ndk;25.1.8937393" > /dev/null 2>&1
        
        echo "✅ Setup complete"

    - name: 🔧 Setup environment variables
      run: |
        echo "ANDROID_SDK_ROOT=$HOME/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "ANDROID_NDK=$HOME/android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "PATH=$PATH:$HOME/android/sdk/cmdline-tools/latest/bin:$HOME/android/sdk/platform-tools" >> $GITHUB_ENV

    - name: 📚 Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install cython==0.29.33
        pip install kivy==2.2.1
        pip install python-for-android==2024.1.21

    - name: 🧹 Clean cache
      run: |
        rm -rf ~/.local/share/python-for-android/
        rm -rf ./build/

    - name: 🏗️ Build APK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        export ANDROID_NDK=$HOME/android/sdk/ndk/25.1.8937393
        export PATH=$PATH:$HOME/android/sdk/cmdline-tools/latest/bin:$HOME/android/sdk/platform-tools
        
        p4a apk \
          --debug \
          --private . \
          --package=org.ats.remote \
          --name="ATS Remote" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,openssl \
          --permission=INTERNET \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --permission=ACCESS_NETWORK_STATE \
          --arch=arm64-v8a \
          --android-api=34 \
          --ndk-version=25.1.8937393

    - name: 📦 Organize artifacts
      run: |
        mkdir -p dist
        APK=$(find . -maxdepth 5 -name "*.apk" -type f 2>/dev/null | head -n 1)
        
        if [ -z "$APK" ]; then
          echo "❌ APK not found!"
          ls -la
          exit 1
        fi
        
        BUILD_DATE=$(date +%Y%m%d-%H%M%S)
        cp "$APK" "dist/ATS-Remote-${BUILD_DATE}.apk"
        echo "✅ APK copied to dist/"
        ls -lh "dist/ATS-Remote-${BUILD_DATE}.apk"

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ATS-Remote-APK
        path: dist/*.apk
        retention-days: 30

    - name: 💾 Push to repo
      if: success() && github.event_name == 'push'
      run: |
        mkdir -p releases
        cp dist/ATS-Remote-*.apk releases/ 2>/dev/null || true
        
        if [ -f releases/ATS-Remote-*.apk ]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/
          git commit -m "🔨 Add APK: $(date +%Y-%m-%d-%H:%M:%S)" || true
          git push || true
          echo "✅ APK pushed to repository"
        fi

    - name: ✅ Build successful!
      if: success()
      run: |
        echo "🎉 Build completed successfully!"
        echo "APK ready in artifacts section"
