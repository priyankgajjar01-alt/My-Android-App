name: Build Kivy APK (Verified Correct Arguments)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  # 📱 જોબ ૧: માત્ર જૂના ફોન માટે (Android 7 થી 9 - 32bit)
  build-32bit:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: 🔥 Remove GitHub's Incompatible NDK
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*

    - name: 🤖 Setup MATCHED SDK & NDK 25.1
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest || (mkdir -p latest && mv bin latest/ && mv lib latest/)
        export PATH=$HOME/android/sdk/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses 2>/dev/null || true
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393" 2>/dev/null || true

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython==3.0.10 kivy==2.3.0 python-for-android==2024.1.21

    - name: 🏗️ Build APK for Android 7 to 9 (32-bit)
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
        
        # 🛠️ સુધારો: સાચો આર્ગ્યુમેન્ટ --minsdk વાપર્યો
        p4a apk \
          --debug --private . --package=org.ats.remote.v7a --name="ATS Remote v7a" --version=1.0 --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy==2.3.0,openssl \
          --permission=INTERNET --permission=READ_EXTERNAL_STORAGE --permission=WRITE_EXTERNAL_STORAGE --permission=ACCESS_NETWORK_STATE \
          --arch=armeabi-v7a --android-api=34 --minsdk=24 \
          --sdk-dir=$ANDROID_SDK_ROOT --ndk-dir=$ANDROID_NDK_ROOT --ndk-version=25.1.8937393
          
        mkdir -p APK
        mv *.apk APK/ATS-Remote-Android-7-to-9.apk

    - name: 💾 Push 32-bit to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add APK/ || true
        git commit -m "🔨 Add 32-bit APK" || true
        git push || true


  # 📱 જોબ ૨: નવા લેટેસ્ટ ફોન માટે (Android 10 થી 15 - 64bit)
  build-64bit:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    permissions:
      contents: write
    needs: build-32bit
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: 🔥 Remove GitHub's Incompatible NDK
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*

    - name: 🤖 Setup MATCHED SDK & NDK 25.1
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest || (mkdir -p latest && mv bin latest/ && mv lib latest/)
        export PATH=$HOME/android/sdk/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses 2>/dev/null || true
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393" 2>/dev/null || true

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython==3.0.10 kivy==2.3.0 python-for-android==2024.1.21

    - name: 🏗️ Build APK for Android 10 to 15 (64-bit)
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
        
        git pull || true
        
        # 🛠️ સુધારો: સાચો આર્ગ્યુમેન્ટ --minsdk વાપર્યો
        p4a apk \
          --debug --private . --package=org.ats.remote --name="ATS Remote" --version=1.0 --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy==2.3.0,openssl \
          --permission=INTERNET --permission=READ_EXTERNAL_STORAGE --permission=WRITE_EXTERNAL_STORAGE --permission=ACCESS_NETWORK_STATE \
          --arch=arm64-v8a --android-api=34 --minsdk=29 \
          --sdk-dir=$ANDROID_SDK_ROOT --ndk-dir=$ANDROID_NDK_ROOT --ndk-version=25.1.8937393
          
        mkdir -p APK
        mv *.apk APK/ATS-Remote-Android-10-to-15.apk

    - name: 💾 Push 64-bit to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add APK/ || true
        git commit -m "🔨 Add 64-bit APK" || true
        git push || true
        
