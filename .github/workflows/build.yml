name: Build Kivy APK (Perfect Version Match 7 to 15)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }
      
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
      
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: 🔥 Remove GitHub's Incompatible NDK
      run: |
        echo "🔥 Removing global NDKs to prevent conflicts..."
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*
        rm -rf ~/.local/share/python-for-android/
        echo "✅ Done"

    - name: 🤖 Setup MATCHED SDK & NDK 25.1
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        if [ -d "cmdline-tools" ]; then mv cmdline-tools latest; else mkdir -p latest && mv bin latest/ && mv lib latest/; fi
        export PATH=$HOME/android/sdk/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses 2>/dev/null || true
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393" 2>/dev/null || true
        echo "✅ SDK and NDK Setup complete"

    - name: 📚 Install EXACTLY MATCHED Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython==3.0.10
        pip install kivy==2.3.0
        pip install python-for-android==2024.1.21

    # 🏗️ બિલ્ડ ૧: માત્ર જૂના ફોન માટે (Android 7 થી 9 - 32bit)
    - name: 🏗️ Build APK for Android 7 to 9 (32-bit)
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
        
        p4a apk \
          --debug \
          --private . \
          --package=org.ats.remote.v7a \
          --name="ATS Remote v7a" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy==2.3.0,openssl \
          --permission=INTERNET --permission=READ_EXTERNAL_STORAGE --permission=WRITE_EXTERNAL_STORAGE --permission=ACCESS_NETWORK_STATE \
          --arch=armeabi-v7a \
          --android-api=34 \
          --min-api=24 \
          --sdk-dir=$ANDROID_SDK_ROOT --ndk-dir=$ANDROID_NDK_ROOT --ndk-version=25.1.8937393
          
        mkdir -p APK_OUTPUT
        mv *.apk APK_OUTPUT/ATS-Remote-Android-7-to-9.apk
        rm -rf ~/.local/share/python-for-android/build/ # ક્લીનઅપ ફોર નેક્સ્ટ બિલ્ડ

    # 🏗️ બિલ્ડ ૨: એકદમ લેટેસ્ટ ફોન માટે (Android 10 થી 15 - 64bit)
    - name: 🏗️ Build APK for Android 10 to 15 (64-bit)
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
        
        p4a apk \
          --debug \
          --private . \
          --package=org.ats.remote \
          --name="ATS Remote" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy==2.3.0,openssl \
          --permission=INTERNET --permission=READ_EXTERNAL_STORAGE --permission=WRITE_EXTERNAL_STORAGE --permission=ACCESS_NETWORK_STATE \
          --arch=arm64-v8a \
          --android-api=34 \
          --min-api=29 \
          --sdk-dir=$ANDROID_SDK_ROOT --ndk-dir=$ANDROID_NDK_ROOT --ndk-version=25.1.8937393
          
        mv *.apk APK_OUTPUT/ATS-Remote-Android-10-to-15.apk

    - name: 📦 Move to final repo folder
      run: |
        mkdir -p APK
        cp APK_OUTPUT/*.apk APK/
        ls -lh APK/

    - name: 💾 Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add APK/ || true
        git commit -m "🔨 Add Matched Device Specific APKs $(date +%Y-%m-%d)" || true
        git push || true
        




