name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip
          pip install --upgrade pip
          pip install kivy[base] cython==0.29.33
          pip install python-for-android==2024.08.22 # <-- aa link khoti hati

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android/sdk/cmdline-tools
          cd $HOME/android/sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
          export ANDROID_SDK_ROOT=$HOME/android/sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android/sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          python3 -m pythonforandroid.toolchain apk --debug --package org.ats.remote --name "ATS Remote" --version 1.0 --bootstrap sdl2 --requirements python3,kivy,android --arch arm64-v8a.

      - uses: actions/upload-artifact@v4
        with: { name: ATS-APK, path: bin/*.apk }
