name: Build Android APK with Buildozer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5  # 🛠️ Node 24 સુસંગત વર્ઝન

      - name: Set up Python
        uses: actions/setup-python@v6  # 🛠️ Node 24 સુસંગત વર્ઝન
        with:
          python-version: '3.10'

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v5  # 🛠️ Node 24 સુસંગત વર્ઝન
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libssl-dev libffi-dev cmake python3-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build Android APK
        run: |
          # 🛠️ ગીટહબ રનર પર ઓટો-લાયસન્સ એક્સેપ્ટ કરવાનો સૌથી બેસ્ટ રસ્તો
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATS-Remote-APK
          path: "**/*.apk"
          
