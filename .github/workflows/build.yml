name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

          yes | sdkmanager --licenses

      - name: Verify AIDL
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          find "$ANDROID_SDK_ROOT" -name aidl
          export PATH=$ANDROID_SDK_ROOT/build-tools/33.0.2:$PATH
          which aidl
          aidl --version || true

      # 🛠️ સુધારો: libncurses5 ની જગ્યાએ નવી સિસ્ટમ માટે libncurses6 અને libncurses-dev સેટ કર્યું
      - name: Install Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf automake libtool \
            pkg-config zlib1g-dev libncurses6 libncurses-dev \
            libffi-dev libssl-dev cmake python3-dev

          python -m pip install --upgrade pip
          pip install buildozer cython virtualenv setuptools wheel

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          export PATH=$ANDROID_SDK_ROOT/build-tools/33.0.2:$ANDROID_SDK_ROOT/platform-tools:$PATH

          # બિલ્ડોઝરને બેઝિક ફોલ્ડર બનાવવાની ફરજ પાડી
          buildozer android pgenવ્યુ || true

          # AIDL ને તેના સાચા સ્થાને લિંક કર્યું
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/
          ln -sf $ANDROID_SDK_ROOT/build-tools/33.0.2/aidl ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/aidl
          
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
          
