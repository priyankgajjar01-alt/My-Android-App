      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          # 1. પાથ સેટઅપ
          export PATH=$ANDROID_SDK_ROOT/build-tools/33.0.2:$ANDROID_SDK_ROOT/platform-tools:$PATH

          # 2. બિલ્ડોઝરને ફક્ત એન્ડ્રોઇડ પ્લેટફોર્મ સેટઅપ કરવા કહ્યું (આનાથી એ ફોલ્ડર બનાવી દેશે પણ બિલ્ડ નહીં કરે)
          buildozer android pgenવ્યુ || true

          # 3. 🚀 હવે જ્યારે બિલ્ડોઝરે ફોલ્ડર બનાવી દીધું છે, ત્યારે જ આપણે એના ટાર્ગેટ પાથ પર ઓફિશિયલ SDK ની સોફ્ટ-લિંક ભરાવી દઈએ!
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/
          ln -sf $ANDROID_SDK_ROOT/build-tools/33.0.2/aidl ~/.buildozer/android/platform/android-sdk/build-tools/33.0.2/aidl
          
          # 4. વેરિફિકેશન માટે ટચ કરી લેવું
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

          # 5. હવે અસલી બિલ્ડ રન કરો, બિલ્ડોઝર છેતરાઈ જશે કારણ કે એને અંદર aidl પહેલેથી જ મળશે!
          buildozer -v android debug
          
