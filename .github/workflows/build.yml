name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ArtemSBulgakov/buildozer-action@v1

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
