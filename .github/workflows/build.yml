name: Build APK
on:
  workflow_dispatch:
  push: # <-- aa line add kari
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - run: sudo apt update && sudo apt install -y git zip unzip openjdk-17-jdk python3-pip && pip install kivy[base] cython==0.29.33
      - run: |
          mkdir -p $HOME/android/sdk/cmdline-tools
          cd $HOME/android/sdk/cmdline-tools && wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
          export ANDROID_SDK_ROOT=$HOME/android/sdk && export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses && sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"
      - run: pip install https://github.com/kivy/python-for-android/archive/refs/tags/2024.08.22.zip
      - run: |
          export ANDROID_SDK_ROOT=$HOME/android/sdk && export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          python3 -m pythonforandroid.toolchain apk --debug --package org.ats.remote --name "ATS Remote" --version 1.0 --bootstrap sdl2 --requirements python3,kivy --arch arm64-v8a.
      - uses: actions/upload-artifact@v4
        with: { name: ATS-APK, path: bin/*.apk }
