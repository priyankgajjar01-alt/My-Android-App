name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip

    - name: Install Buildozer
      run: pip3 install buildozer

    - name: Setup Android SDK cmdline-tools
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25b"
      env:
        ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk

    - name: Build APK with Buildozer
      run: buildozer android debug
      env:
        ANDROID_SDK_ROOT: ~/.buildozer/android/platform/android-sdk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ATS-Remote-Connector-APK
        path: bin/*.apk
        retention-days: 7
