
name: Build Universal Android SSH Gateway
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }

    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: рџ“¦ Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    # рџ“Ѓ аЄ¬аЄѕаЄ€аЄЁаЄ°а«ЂаЄќ аЄёа«ЌаЄџа«‹аЄ° аЄ•аЄ°аЄµаЄѕ аЄ®аЄѕаЄџа«‡аЄЁа«ЃаЄ‚ аЄ«а«‹аЄІа«ЌаЄЎаЄ° аЄ¬аЄЁаЄѕаЄµа«‹
    - name: рџ“Ѓ Create Bin Directory
      run: mkdir -p bin

    # рџ› пёЏ 1. 64-bit (ARM64) аЄ¬аЄѕаЄ€аЄЁаЄ°а«Ђ Docker аЄ¦а«ЌаЄµаЄѕаЄ°аЄѕ аЄ•аЄ®а«ЌаЄЄаЄѕаЄ€аЄІ аЄ•аЄ°а«‹
   - name: рџ› пёЏ Build Android ARM64 SSH Binary
  run: |
    docker build -t android-ssh-64 -f docker/Dockerfile.aarch64 .
    docker run --rm -v ${{ github.workspace }}/bin:/output android-ssh-64 cp /root/openssh/build/sshd /output/sshd_64

- name: рџ› пёЏ Build Android ARM32 SSH Binary
  run: |
    docker build -t android-ssh-32 -f docker/Dockerfile.arm .
    docker run --rm -v ${{ github.workspace }}/bin:/output android-ssh-32 cp /root/openssh/build/sshd /output/sshd_32
   
    - name: рџ”Ґ Force Wipe Global New NDKs
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*

    - name: рџ¤– Setup SDK & NDK 25.2 (API 34)
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest

        export ANDROID_HOME=$HOME/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

    - name: рџ“љ Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade cython==0.29.33 kivy[base] python-for-android==2024.1.21

    # рџЋЇ FIX 1: p4a ne system zlib vaprva force karo
    - name: рџ› пёЏ Fix Zlib Compile Issue
      run: |
        export P4A_USE_SYSTEM_ZLIB=1
        echo "P4A_USE_SYSTEM_ZLIB=1" >> $GITHUB_ENV

    # рџЋЇ FIX 2: sshd binaries ne app ma include karva mate src folder banavo
    - name: рџ“¦ Prepare Source with Binaries
      run: |
        mkdir -p src
        cp main.py src/
        cp -r kv/ src/ 2>/dev/null || true
        cp -r bin/ src/private/
        echo "вњ… Binaries moved to src/private/"

    - name: рџ§№ Clean Previous Build Cache
      run: |
        rm -rf.buildozer/

    # рџ› пёЏ аЄ¬аЄїаЄІа«ЌаЄЎ аЄЄа«ЌаЄ°а«‹аЄёа«‡аЄё: аЄЁаЄµа«ЃаЄ‚ аЄЁаЄѕаЄ®, аЄЁаЄµа«Ђ Requirements аЄ…аЄЁа«‡ 32/64-bit аЄ¬аЄ‚аЄЁа«‡ аЄ†аЄ°а«ЌаЄ•аЄїаЄџа«‡аЄ•а«ЌаЄљаЄ° аЄЄа«‡аЄ• аЄ•аЄ°а«‹
    - name: Build APK
      env:
        ANDROIDSDK: /home/runner/android/sdk
        ANDROIDNDK: /home/runner/android/sdk/ndk/25.2.9519653
        ANDROIDAPI: 34
        P4A_USE_SYSTEM_ZLIB: 1
      run: |
        export PATH=$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools
        export ANDROIDNDKTOOL=$ANDROIDNDK/toolchains/llvm/prebuilt/linux-x86_64/bin

        # рџЋЇ FIX 3: --private src karo ane requirements ma openssl add karo
        python3 -m pythonforandroid.toolchain apk --debug --private./src \
          --package=org.test.sshgateway \
          --name="SSH Gateway" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,pyjnius,android,openssl \
          --permission INTERNET \
          --permission ACCESS_NETWORK_STATE \
          --permission READ_EXTERNAL_STORAGE \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission MANAGE_EXTERNAL_STORAGE \
          --permission READ_MEDIA_IMAGES \
          --permission READ_MEDIA_VIDEO \
          --permission READ_MEDIA_AUDIO \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --android-api=34 \
          --sdk-dir=$ANDROIDSDK \
          --ndk-dir=$ANDROIDNDK \
          --ndk-version=25.2.9519653

    - name: Copy APK
      run: |
        rm -rf APK/*
        mkdir -p APK
        APK_PATH=$(find. -type f -name "*.apk" 2>/dev/null | head -n 1)

        if [! -z "$APK_PATH" ]; then
          echo "рџЋЇ APK аЄ®аЄіа«Ђ аЄ—аЄ€ аЄ…аЄ№а«ЂаЄ‚: $APK_PATH"
          cp "$APK_PATH" APK/SSH-Gateway-$(date +%Y%m%d-%H%M).apk
          echo "вњ… APK аЄёаЄ«аЄіаЄ¤аЄѕаЄЄа«‚аЄ°а«ЌаЄµаЄ• аЄ•а«‹аЄЄа«Ђ аЄҐаЄ€ аЄ—аЄ€ аЄ›а«‡!"
        else
          echo "вќЊ аЄЏаЄЄа«ЂаЄ•а«‡ аЄ¬аЄЁа«Ђ аЄЁаЄҐа«Ђ. аЄІа«‹аЄ—а«ЌаЄё аЄња«ЃаЄ“:"
          ls -la bin/ || true
          exit 1
        fi

    - name: Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git pull origin main --rebase || true
        git add APK/
        git commit -m "Add Universal SSH Gateway APK (Dual-Arch Build) [$(date +%Y%m%d-%H%M)]" || true
        git push origin main
