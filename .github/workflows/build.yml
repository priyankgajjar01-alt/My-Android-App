name: Build Android APK with Buildozer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 🛠️ સ્ટેપ ૧: ગીટહબ રનર પર લેટેસ્ટ સિસ્ટમ ડિપેન્ડન્સીઝ ઇન્સ્ટોલ કરવી
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libssl-dev libffi-dev cmake python3-dev
          python -m pip install --upgrade pip
          python -m pip install --upgrade buildozer cython virtualenv setuptools wheel

      # 🛠️ સ્ટેપ ૨: ડાયરેક્ટ ગ્લોબલ પાથ કન્ફિગરેશન સાથે બિલ્ડ
      - name: Build Android APK
        env:
          ACCEPT_SDK_LICENSE: "y"
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # ગીટહબના ઑફિશિયલ SDK માંથી ડાયરેક્ટ બિલ્ડ ટૂલ્સ ઇન્સ્ટોલ કર્યા
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          buildozer -v android debug

      # 🛠️ સ્ટેપ ૩: ફાઇનલ APK આર્ટિફેક્ટ અપલોડ કરવું
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ATS-Remote-APK
          path: "**/*.apk"
          
