name: Build Photon Clint 64bit APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }

    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: 🔥 Force Wipe Global New NDKs
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*

    - name: 🤖 Setup SDK & NDK 25.2 (API 34)
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest

        export ANDROID_HOME=$HOME/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython==0.29.33 kivy[base] python-for-android==2024.1.21

    - name: 🧹 Clean Previous Build Cache
      run: |
        # 🎯 FIX: rf અને ડોટ વચ્ચે સ્પેસ સેટ કરી
        rm -rf .buildozer/

    # 🛠️ બિલ્ડ પ્રોસેસ: પ્યોર 64-bit (ARM64) અને API 34 સાથે કમ્પ્લીટ બિલ્ડ
    - name: Build APK
      env: 
        # 🎯 FIX: ગિટહબ રનર માટે એબ્સોલ્યુટ પાથ સેટ કર્યો જેથી વેરીએબલ ખાલી ન રહે
        ANDROIDSDK: /home/runner/android/sdk
        ANDROIDNDK: /home/runner/android/sdk/ndk/25.2.9519653
        ANDROIDAPI: 34
      run: |
        export PATH=$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools
        export ANDROIDNDKTOOL=$ANDROIDNDK/toolchains/llvm/prebuilt/linux-x86_64/bin

        # 🎯 FIX: --private અને ડોટ વચ્ચે સ્પેસ સેટ કરી (સ્લેશ હટાવી દીધો)
        python3 -m pythonforandroid.toolchain apk --debug --private . \
          --package=org.test.internetstorage \
          --name="Internet Storage Access" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,openssl,android \
          --permission INTERNET \
          --permission ACCESS_NETWORK_STATE \
          --permission READ_EXTERNAL_STORAGE \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission MANAGE_EXTERNAL_STORAGE \
          --permission READ_MEDIA_IMAGES \
          --permission READ_MEDIA_VIDEO \
          --permission READ_MEDIA_AUDIO \
          --arch=arm64-v8a \
          --android-api=34 \
          --sdk-dir=$ANDROIDSDK \
          --ndk-dir=$ANDROIDNDK \
          --ndk-version=25.2.9519653

    - name: Copy APK
      run: |
        rm -rf APK/*
        mkdir -p APK
        # 🎯 FIX: find અને ડોટ વચ્ચે સ્પેસ
        APK_PATH=$(find . -type f -name "*.apk" 2>/dev/null | head -n 1)

        # 🎯 FIX: બ્રેકેટ સ્પેસિંગ સેટ કરી
        if [ ! -z "$APK_PATH" ]; then
          echo "🎯 APK મળી ગઈ અહીં: $APK_PATH"
          cp "$APK_PATH" APK/Photon-Clint-$(date +%Y%m%d-%H%M).apk
          echo "✅ APK સફળતાપૂર્વક કોપી થઈ ગઈ છે!"
        else
          echo "❌ એપીકે બની નથી. લોગ્સ જુઓ:"
          ls -la bin/ || true
          exit 1
        fi

    - name: Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git pull origin main --rebase || true
        git add APK/
        git commit -m "Add Photon Clint APK (64-bit API 34 Build) [$(date +%Y%m%d-%H%M)]" || true
        git push origin main
