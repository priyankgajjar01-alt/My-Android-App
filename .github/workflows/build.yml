name: Build Kivy APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      ANDROID_SDK_ROOT: /home/runner/android/sdk

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - run: sudo apt-get update && sudo apt-get install -y git zip unzip
    - run: pip install --upgrade pip && pip install cython==0.29.33 kivy[base] python-for-android==2024.1.21

    - name: Setup SDK
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"

    - name: Build APK
      run: |
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
        python -m pythonforandroid.toolchain create --debug --package=org.ats.remote --name="ATS Remote" --version=1.0 --bootstrap=sdl2 --requirements=python3,kivy,android --arch=arm64-v8a --android-api=34 --ndk-dir=$ANDROID_SDK_ROOT/ndk/25.1.8937393
        find. -name "*.apk" # <-- aa thi apk kya banu e shodhis

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ATS-APK
        path:./**/bin/*.apk # <-- AA PATH CHANGE KARYU
        if-no-files-found: error
