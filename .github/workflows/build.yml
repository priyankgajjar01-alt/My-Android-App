name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    permissions:
      contents: write
      actions: read

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    - name: 🔥 Deep clean - remove all Android stuff
      run: |
        echo "🔥 Removing all cached Android files..."
        rm -rf ~/android/
        rm -rf ~/.android/
        rm -rf ~/.gradle/
        rm -rf ~/.local/share/python-for-android/
        rm -rf ~/.buildozer/
        rm -rf ./build/
        rm -rf ./bin/
        echo "✅ Cleaned!"

    - name: 🤖 Fresh Android SDK setup with NDK 25.1 ONLY
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        
        echo "📥 Downloading Command Line Tools..."
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        
        if [ -d "cmdline-tools" ]; then
          mv cmdline-tools latest
        else
          mkdir -p latest
          mv bin latest/
          mv lib latest/
        fi
        
        export PATH=$PATH:$HOME/android/sdk/cmdline-tools/latest/bin
        
        echo "📋 Accepting licenses..."
        yes | sdkmanager --licenses 2>/dev/null || true
        
        echo "📥 Installing platform-tools..."
        sdkmanager --install "platform-tools" 2>/dev/null || true
        
        echo "📥 Installing Android 34..."
        sdkmanager --install "platforms;android-34" 2>/dev/null || true
        
        echo "📥 Installing build-tools 34.0.0..."
        sdkmanager --install "build-tools;34.0.0" 2>/dev/null || true
        
        echo "📥 Installing NDK 25.1 ONLY..."
        sdkmanager --install "ndk;25.1.8937393" 2>/dev/null || true
        
        echo "✅ Setup complete"
        echo "NDK version:"
        ls -la $HOME/android/sdk/ndk/
        
        # Make absolutely sure 27.x doesn't exist
        rm -rf $HOME/android/sdk/ndk/27.*
        echo "Remaining NDK:"
        ls -la $HOME/android/sdk/ndk/

    - name: 🔧 Set environment variables
      run: |
        echo "ANDROID_SDK_ROOT=$HOME/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "ANDROID_NDK=$HOME/android/sdk/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "ANDROID_NDK_VERSION=25.1.8937393" >> $GITHUB_ENV
        echo "PATH=$HOME/android/sdk/cmdline-tools/latest/bin:$HOME/android/sdk/platform-tools:$PATH" >> $GITHUB_ENV

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython==0.29.33
        pip install --upgrade kivy==2.2.1
        pip install --upgrade python-for-android==2024.1.21

    - name: 🧹 Final clean before build
      run: |
        rm -rf ~/.local/share/python-for-android/
        rm -rf ~/.buildozer/
        rm -rf ./build/
        echo "✅ Ready to build!"

    - name: 🏗️ Build APK
      run: |
        # Set variables explicitly
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        export ANDROID_NDK=$HOME/android/sdk/ndk/25.1.8937393
        export PATH=$HOME/android/sdk/cmdline-tools/latest/bin:$HOME/android/sdk/platform-tools:$PATH
        
        echo "🔍 Verifying environment..."
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
        ls -la $ANDROID_NDK_ROOT/
        
        echo ""
        echo "🚀 Building APK..."
        
        p4a apk \
          --debug \
          --private . \
          --package=org.ats.remote \
          --name="ATS Remote" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,openssl \
          --permission=INTERNET \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --permission=ACCESS_NETWORK_STATE \
          --arch=arm64-v8a \
          --android-api=34 \
          --ndk-version=25.1.8937393 \
          --ndk-path=$ANDROID_NDK_ROOT
        
        echo "✅ Build complete!"

    - name: 📦 Find and copy APK
      run: |
        mkdir -p dist
        echo "🔍 Searching for APK..."
        APK=$(find . -maxdepth 10 -name "*.apk" -type f 2>/dev/null | head -n 1)
        
        if [ -z "$APK" ]; then
          echo "❌ APK not found!"
          echo ""
          echo "Directory contents:"
          ls -la
          echo ""
          echo "Search results:"
          find . -name "*.apk" 2>/dev/null || echo "No APK files found"
          exit 1
        fi
        
        echo "✅ Found APK: $APK"
        BUILD_DATE=$(date +%Y%m%d-%H%M%S)
        cp "$APK" "dist/ATS-Remote-${BUILD_DATE}.apk"
        ls -lh "dist/ATS-Remote-${BUILD_DATE}.apk"

    - name: 📤 Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: ATS-Remote-APK
        path: dist/*.apk
        retention-days: 30

    - name: 💾 Commit APK to repo
      if: success() && github.event_name == 'push'
      run: |
        mkdir -p releases
        cp dist/ATS-Remote-*.apk releases/ 2>/dev/null || true
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add releases/ || true
        git commit -m "Add APK build $(date +%Y-%m-%d)" || true
        git push || true

    - name: ✅ Success!
      if: success()
      run: echo "🎉 APK built successfully!"

    - name: ❌ Debug on failure
      if: failure()
      run: |
        echo "Checking what went wrong..."
        echo ""
        echo "NDK location:"
        ls -la ~/android/sdk/ndk/ 2>/dev/null || echo "NDK not found"
        echo ""
        echo "Build logs:"
        tail -100 ~/.local/share/python-for-android/build/other_builds/SDL2-*/build/release/SDL2/src/sensor/android/SDL_androidsensor.c 2>/dev/null || echo "Log not found"
