name: Build Photon Clint APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }
      
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    # 🛠️ રનરના ડિફોલ્ટ NDK 27/28/29 ને ગ્લોબલ પાથ પરથી ઉડાવી દીધા જેથી એ જૂના API સાથે કન્ફ્લિક્ટ ન કરે!
    - name: 🔥 Force Wipe Global New NDKs
      run: |
        echo "🔥 Wiping incompatible default NDKs from Github Runner..."
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*
        echo "✅ Global clean done!"

    # 🌟 API 28 માટે એકદમ મેચિંગ ટૂલ્સ અને પ્લેટફોર્મ ડાઉનલોડ કરવું
    - name: 🤖 Setup SDK & NDK 25.1 (Optimized for API 28)
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest
        export PATH=$PATH:$HOME/android/sdk/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-28" "build-tools;28.0.3" "ndk;25.1.8937393"

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade cython==0.29.33 kivy[base] python-for-android==2024.1.21

    - name: 🧹 Clean Previous Build Cache & Old Configs
      run: |
        echo "🧹 Cleaning old cache..."
        rm -rf .buildozer/
        rm -f buildozer.spec
        python3 -m pythonforandroid.toolchain clean_all || true
        echo "✅ Clean done!"

    # 🌟 બિલ્ડ પ્રોસેસ: પ્યોર 32-bit (ARMv7) અને API 28 સાથે કમ્પ્લીટ મેચિંગ બિલ્ડ
    - name: Build APK
      run: |
        export ANDROLLER_SDK_ROOT=$HOME/android/sdk
        export ANDROLLER_NDK_ROOT=$HOME/android/sdk/ndk/25.1.8937393
        
        p4a apk --debug --private . \
          --package=org.test.internetstorage \
          --name="Internet Storage Access" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,openssl,android \
          --permission INTERNET \
          --permission ACCESS_NETWORK_STATE \
          --permission READ_EXTERNAL_STORAGE \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission MANAGE_EXTERNAL_STORAGE \
          --arch=armeabi-v7a \
          --android-api=28 \
          --sdk-dir=$ANDROLLER_SDK_ROOT \
          --ndk-dir=$ANDROLLER_NDK_ROOT \
          --ndk-version=25.1.8937393

    - name: Copy APK
      run: |
        rm -rf APK/*.apk
        mkdir -p APK
        
        APK_PATH=$(find . -maxdepth 2 -name "*.apk" 2>/dev/null | head -n 1)
        
        if [ ! -z "$APK_PATH" ]; then
          echo "🎯 APK મળી ગઈ અહીં: $APK_PATH"
          cp "$APK_PATH" APK/Photon-Clint-Latest.apk
          echo "✅ APK સફળતાપૂર્વક કોપી થઈ ગઈ છે!"
        else
          echo "❌ એપીકે બની નથી. લોગ્સ ચેક કરો:"
          ls -la
          exit 1
        fi

    - name: Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        
        mv APK/Photon-Clint-Latest.apk ../Photon-Clint-Latest.apk
        
        git fetch origin main
        git reset --hard origin/main
        
        mkdir -p APK
        mv ../Photon-Clint-Latest.apk APK/Photon-Clint-Latest.apk
        
        git add APK/Photon-Clint-Latest.apk
        git commit -m "Update APK file (32-bit API 28 Build)" || echo "No changes to commit"
        git push origin main --force
