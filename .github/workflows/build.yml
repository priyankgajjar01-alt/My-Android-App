
name: Build Universal Android SSH Gateway
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }

    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    # 📁 બાઈનરીઝ સ્ટોર કરવા માટેનું ફોલ્ડર બનાવો
    - name: 📁 Create Bin Directory
      run: mkdir -p bin

    # 🛠️ 1. 64-bit (ARM64) બાઈનરી Docker દ્વારા કમ્પાઈલ કરો
    - name: 🛠️ Build Android ARM64 SSH Binary
      run: |
        docker build -t android-ssh-64 -f docker/Dockerfile.aarch64 .
        docker run --rm -v ${{ github.workspace }}/bin:/output android-ssh-64 cp /root/openssh/build/sshd /output/sshd_64

    # 🛠️ 2. 32-bit (ARMv7) બાઈનરી Docker દ્વારા કમ્પાઈલ કરો
    - name: 🛠️ Build Android ARM32 SSH Binary
      run: |
        docker build -t android-ssh-32 -f docker/Dockerfile.arm .
        docker run --rm -v ${{ github.workspace }}/bin:/output android-ssh-32 cp /root/openssh/build/sshd /output/sshd_32

    - name: 🔥 Force Wipe Global New NDKs
      run: |
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*

    - name: 🤖 Setup SDK & NDK 25.2 (API 34)
      run: |
        mkdir -p $HOME/android/sdk/cmdline-tools
        cd $HOME/android/sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip && mv cmdline-tools latest

        export ANDROID_HOME=$HOME/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

    - name: 📚 Install Python packages
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade cython==0.29.33 kivy[base] python-for-android==2024.1.21

    # 🎯 FIX 1: p4a ne system zlib vaprva force karo
    - name: 🛠️ Fix Zlib Compile Issue
      run: |
        export P4A_USE_SYSTEM_ZLIB=1
        echo "P4A_USE_SYSTEM_ZLIB=1" >> $GITHUB_ENV

    # 🎯 FIX 2: sshd binaries ne app ma include karva mate src folder banavo
    - name: 📦 Prepare Source with Binaries
      run: |
        mkdir -p src
        cp main.py src/
        cp -r kv/ src/ 2>/dev/null || true
        cp -r bin/ src/private/
        echo "✅ Binaries moved to src/private/"

    - name: 🧹 Clean Previous Build Cache
      run: |
        rm -rf.buildozer/

    # 🛠️ બિલ્ડ પ્રોસેસ: નવું નામ, નવી Requirements અને 32/64-bit બંને આર્કિટેક્ચર પેક કરો
    - name: Build APK
      env:
        ANDROIDSDK: /home/runner/android/sdk
        ANDROIDNDK: /home/runner/android/sdk/ndk/25.2.9519653
        ANDROIDAPI: 34
        P4A_USE_SYSTEM_ZLIB: 1
      run: |
        export PATH=$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools
        export ANDROIDNDKTOOL=$ANDROIDNDK/toolchains/llvm/prebuilt/linux-x86_64/bin

        # 🎯 FIX 3: --private./src space set kari
        python3 -m pythonforandroid.toolchain apk --debug --private./src \
          --package=org.test.sshgateway \
          --name="SSH Gateway" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=hostpython3,python3,kivy,pyjnius,android,openssl \
          --permission INTERNET \
          --permission ACCESS_NETWORK_STATE \
          --permission READ_EXTERNAL_STORAGE \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission MANAGE_EXTERNAL_STORAGE \
          --permission READ_MEDIA_IMAGES \
          --permission READ_MEDIA_VIDEO \
          --permission READ_MEDIA_AUDIO \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --android-api=34 \
          --sdk-dir=$ANDROIDSDK \
          --ndk-dir=$ANDROIDNDK \
          --ndk-version=25.2.9519653

    - name: Copy APK
      run: |
        rm -rf APK/*
        mkdir -p APK
        APK_PATH=$(find. -type f -name "*.apk" 2>/dev/null | head -n 1)

        if [! -z "$APK_PATH" ]; then
          echo "🎯 APK મળી ગઈ અહીં: $APK_PATH"
          cp "$APK_PATH" APK/SSH-Gateway-$(date +%Y%m%d-%H%M).apk
          echo "✅ APK સફળતાપૂર્વક કોપી થઈ ગઈ છે!"
        else
          echo "❌ એપીકે બની નથી. લોગ્સ જુઓ:"
          ls -la bin/ || true
          exit 1
        fi

    - name: Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git pull origin main --rebase || true
        git add APK/
        git commit -m "Add Universal SSH Gateway APK (Dual-Arch Build) [$(date +%Y%m%d-%H%M)]" || true
        git push origin main
