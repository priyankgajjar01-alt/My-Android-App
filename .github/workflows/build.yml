name: Build Android Tunnel Receiver APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write

    steps:

    # ============================================================
    # 1. CHECKOUT SOURCE CODE
    # ============================================================
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    # ============================================================
    # 2. SETUP PYTHON 3.10
    # ============================================================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'


    # ============================================================
    # 3. SETUP JAVA 17
    # ============================================================
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'


    # ============================================================
    # 4. FORCE CLEAN
    # ============================================================
    - name: FORCE CLEAN
      run: |
        echo "Cleaning old build files..."

        rm -rf .buildozer/
        rm -rf .pytest_cache/
        rm -rf __pycache__/

        rm -rf "$HOME/.local/share/python-for-android/"
        rm -rf "$HOME/.cache/pip/"
        rm -rf "$HOME/.gradle/"

        sudo rm -rf /usr/local/lib/android/sdk/ndk/27*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/28*
        sudo rm -rf /usr/local/lib/android/sdk/ndk/29*

        echo "Clean completed."


    # ============================================================
    # 5. INSTALL SYSTEM DEPENDENCIES
    # ============================================================
    - name: Install system dependencies
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          git \
          zip \
          unzip \
          wget \
          curl \
          autoconf \
          automake \
          libtool \
          pkg-config \
          zlib1g-dev \
          libffi-dev \
          libssl-dev \
          cmake \
          build-essential


    # ============================================================
    # 6. SETUP ANDROID SDK + NDK 25.1
    # ============================================================
    - name: Setup Android SDK and NDK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        echo "ANDROID_SDK_ROOT=$HOME/android/sdk" >> $GITHUB_ENV

        mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
        cd "$ANDROID_SDK_ROOT/cmdline-tools"

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

        rm -rf latest
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest

        if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin" ]; then
          BIN_PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin"
        else
          BIN_PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
        fi

        echo "$BIN_PATH" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

        export PATH="$BIN_PATH:$ANDROID_SDK_ROOT/platform-tools:$PATH"

        yes | sdkmanager --licenses

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "ndk;25.1.8937393"


    # ============================================================
    # 7. INSTALL PYTHON PACKAGES
    # ============================================================
    - name: Install Python packages
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --upgrade setuptools wheel

        python3 -m pip install \
          cython==0.29.33 \
          kivy[base] \
          python-for-android==2024.1.21 \
          websocket-client


    # ============================================================
    # 8. BUILD ANDROID TUNNEL RECEIVER APK
    # ============================================================
    - name: Build Android Tunnel Receiver APK
      run: |
        # ખાસ કરીને main.py ને જ કોપી કરો 
        mkdir -p app_source
        
        if [ ! -f "main.py" ]; then
          echo "Error: main.py not found in the repository root!"
          exit 1
        fi
        
        cp main.py app_source/

        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.1.8937393
        export JAVA_HOME=$JAVA_HOME_17_X64

        export PATH=$JAVA_HOME/bin:$PATH

        # અહીંયા --permission=WAKE_LOCK ઉમેરવામાં આવ્યું છે 
        python3 -m pythonforandroid.toolchain apk \
          --debug \
          --private app_source \
          --package=com.gai.androidtunnelreceiver \
          --name="Android Tunnel Receiver" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --dist_name=android_tunnel_receiver_dist \
          --requirements=hostpython3,python3,kivy,pyjnius,websocket-client \
          --permission=INTERNET \
          --permission=ACCESS_NETWORK_STATE \
          --permission=ACCESS_WIFI_STATE \
          --permission=MANAGE_EXTERNAL_STORAGE \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --permission=WAKE_LOCK \
          --arch=arm64-v8a \
          --android-api=34 \
          --sdk-dir=$ANDROID_SDK_ROOT \
          --ndk-dir=$ANDROID_NDK_ROOT \
          --ndk-version=25.1.8937393


    # ============================================================
    # 9. COPY APK
    # ============================================================
    - name: Copy APK
      run: |
        mkdir -p APK

        NEW_APK=$(find . \
          -type f \
          -name "*.apk" \
          2>/dev/null \
          | grep -v "APK/" \
          | grep -v "gradle" \
          | head -n 1)

        if [ -n "$NEW_APK" ]; then
          echo "APK found:"
          echo "$NEW_APK"

          OUTPUT_NAME="APK/Android-Tunnel-Receiver-$(date +%Y%m%d-%H%M).apk"
          cp "$NEW_APK" "$OUTPUT_NAME"

          echo "APK saved as:"
          echo "$OUTPUT_NAME"
        else
          echo "APK build failed."
          echo "Searching for APK files..."
          find . -type f -name "*.apk" -print
          echo "Searching all files..."
          find . -maxdepth 5 -type f | sort
          exit 1
        fi


    # ============================================================
    # 10. PUSH APK TO GITHUB REPOSITORY
    # ============================================================
    - name: Push APK to repository
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git pull origin main --rebase || true

        git add APK/

        git diff --cached --quiet || \
        (
          git commit -m "Add New Android Tunnel Receiver APK" &&
          git push origin main
        )
