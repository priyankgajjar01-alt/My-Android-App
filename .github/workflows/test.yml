name: Build Dropbear Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential autoconf automake libtool pkg-config curl unzip file

    - name: Download NDK
      run: |
        cd $HOME
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
        unzip -q android-ndk-r27c-linux.zip

    - name: Run Build
      run: |
        git clone --depth 1 https://github.com/ribbons/android-dropbear.git $HOME/ribbons-build
        cd $HOME/ribbons-build
        
        # NDK પાથ સેટઅપ
        MY_NDK=$(find "$HOME" -maxdepth 1 -type d -name "android-ndk-r27*" | head -n1)
        export NDK=$MY_NDK
        export ANDROID_NDK_HOME=$MY_NDK
        
        # બિલ્ડ પ્રોસેસ
        chmod +x build* 2>/dev/null || true
        if [ -f ./build.sh ]; then
            TARGET=aarch64-linux-android ./build.sh
        elif [ -f ./build ]; then
            TARGET=aarch64-linux-android ./build
        else
            ./autogen.sh || autoreconf -fi
            ./configure --host=aarch64-linux-android --build=x86_64-pc-linux-gnu --disable-zlib ac_cv_func_getpgrp_void=yes
            make PROGRAMS="dropbear" MULTI=1 -j$(nproc)
        fi

    - name: Push Binary
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p bin
        
        # બાઈનરી કોપી કરવાનું લોજિક
        find $HOME/ribbons-build -name "dropbearmulti" -o -name "dropbear" -o -name "sshd" | head -n 1 | xargs -I {} cp {} bin/sshd_64 || true
        
        if [ -f bin/sshd_64 ]; then
            chmod +x bin/sshd_64
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bin/sshd_64
            git diff-index --quiet HEAD || git commit -m "Update sshd_64 via action [$(date +%Y%m%d-%H%M)]"
            git pull --rebase origin main || true
            git push origin main
            echo "🟢 Done!"
        else
            echo "❌ Failed to generate binary!"
            exit 1
        fi
