name: Build BT Car APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }
      
    - uses: actions/setup-python@v5
      with: { python-version: '3.10' }
    - uses: actions/setup-java@v4
      with: { distribution: 'temurin', java-version: '17' }

    # 🛠️ સ્ટેપ ૧: FORCE CLEAN
    - name: "🧹 FORCE CLEAN: Wipe All Runner Cache"
      run: |
        echo "🧼 Starting Force Clean..."
        rm -rf .buildozer/ .pytest_cache/ __pycache__/
        rm -rf $HOME/.local/share/python-for-android/
        rm -rf $HOME/.cache/pip/
        rm -rf $HOME/.gradle/
        sudo rm -rf /usr/local/lib/android/sdk/ndk/27* /usr/local/lib/android/sdk/ndk/28* /usr/local/lib/android/sdk/ndk/29*
        echo "✨ Runner is 100% clean!"

    # 🛠️ સ્ટેપ ૨: સિસ્ટમ ડિપેન્ડન્સીસ
    - name: 📦 Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip autoconf automake libtool pkg-config \
          zlib1g-dev libffi-dev libssl-dev cmake build-essential

    # 🛠️ સ્ટેપ ૩: Fresh Setup SDK & NDK 25.1
    - name: 🤖 Fresh Setup SDK & NDK 25.1
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        echo "ANDROID_SDK_ROOT=$HOME/android/sdk" >> $GITHUB_ENV
        
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        
        rm -rf latest
        unzip -q commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        
        if [ -d "$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin" ]; then
          BIN_PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/cmdline-tools/bin"
        else
          BIN_PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
        fi
        
        echo "$BIN_PATH" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        
        export PATH="$BIN_PATH:$ANDROID_SDK_ROOT/platform-tools:$PATH"
        
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393"

    # 🛠️ સ્ટેપ ૪: Python packages
    - name: 📚 Fresh Install Python packages
      run: |
        python3 -m pip install --upgrade pip setuptools wheel
        python3 -m pip install --upgrade cython==0.29.33 kivy[base] python-for-android==2024.1.21

# 🛠️ સ્ટેપ ૫: Build BT Car APK (સુધારેલું સ્ટેપ)
    - name: Build BT Car APK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android/sdk
        export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.1.8937393
        export JAVA_HOME=$JAVA_HOME_17_X64
        export PATH=$JAVA_HOME/bin:$PATH
        
        python3 -m pythonforandroid.toolchain apk --debug --private . \
          --package=com.gai.btcar \
          --name="BT Car" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --dist_name=bt_car_dist \
          --requirements=hostpython3,python3,kivy,pyjnius \
          --permission=BLUETOOTH \
          --permission=BLUETOOTH_ADMIN \
          --permission=BLUETOOTH_CONNECT \
          --permission=BLUETOOTH_SCAN \
          --arch=arm64-v8a \
          --android-api=34 \
          --sdk-dir=$ANDROID_SDK_ROOT \
          --ndk-dir=$ANDROID_NDK_ROOT \
          --ndk-version=25.1.8937393


    # 🛠️ સ્ટેપ ૬: APK કોપી
    - name: Copy APK
      run: |
        mkdir -p APK
        NEW_APK=$(find . -type f -name "*.apk" 2>/dev/null | grep -v "APK/" | grep -v "gradle" | head -n 1)
        
        if [ ! -z "$NEW_APK" ]; then
          echo "🎯 નવી APK મળી ગઈ: $NEW_APK"
          OUTPUT_NAME="APK/BT-Car-$(date +%Y%m%d-%H%M).apk"
          cp "$NEW_APK" "$OUTPUT_NAME"
          echo "✅ નવી APK આ નામે સેવ થઈ: $OUTPUT_NAME"
        else
          echo "❌ એપીકે બની નથી. લોગ્સ ચેક કરો:"
          ls -la
          exit 1
        fi

    # 🛠️ સ્ટેપ ૭: GitHub રિપોઝિટરીમાં પુશ
    - name: Push to Repo
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git pull origin main --rebase || true
        git add APK/
        
        git diff --cached --quiet || (git commit -m "Add New BT Car APK Version" && git push origin main)
