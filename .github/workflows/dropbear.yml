name: Build Kivy App with p4a

on:
  workflow_dispatch:
  # જો તમારે ઓટો-રન રાખવું હોય તો નીચેની 2 લાઇન કાઢતા નહીં
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 📦 Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: ☕ Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 🛠️ Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config libffi-dev \
          libssl-dev cmake gettext texinfo build-essential patch opencv-data libltdl-dev \
          libgmp-dev libmpfr-dev libmpc-dev

    - name: 🤖 Setup Android SDK & NDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d $HOME/android-sdk/cmdline-tools
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        yes | sdkmanager --licenses > /dev/null
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" > /dev/null
        
        cd $HOME
        # 🎯 FIX 1: NDK r25c વાપરીશું
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

    - name: 🚀 Install python-for-android & Cython
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33
        pip install git+https://github.com/kivy/python-for-android.git

    - name: 🏗️ Package APK via python-for-android
      run: |
        export ANDROID_HOME=${{ env.ANDROID_HOME }}
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        p4a clean_all || true
        
        # 🎯 FIX 2: kivy==2.2.1 વર્ઝન લોક કર્યું જેથી libthorvg ની એરર બાયપાસ થઈ જાય!
        p4a apk \
          --private $GITHUB_WORKSPACE \
          --package=org.isa3.app \
          --name="ISA_3" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy==2.2.1,jnius,openssl \
          --arch=arm64-v8a \
          --permission=INTERNET \
          --permission=ACCESS_NETWORK_STATE \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE

    - name: 📤 Push APK directly to GitHub Repository
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p output
        
        find . -name "*.apk" ! -path "./output/*" -exec cp {} output/ISA_3.apk \;
        
        if [ -f output/ISA_3.apk ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            
            git add output/ISA_3.apk
            git commit -m "🚀 Auto-update ISA_3.apk [$(date +%Y%m%d-%H%M)]" || true
            git pull --rebase origin main || true
            git push origin main
            echo "🟢 APK Successfully pushed to repository inside 'output/' folder!"
        else
            echo "❌ APK build failed, target file not found!"
            exit 1
        fi
