name: Check and Build Android Dropbear
on:
  push:
    paths-ignore:
      - 'bin/**'  # bin માં commit થાય ત્યારે ફરીથી trigger ન થાય
  workflow_dispatch:

env:
  SRC_OWNER: mkj
  SRC_REPO: dropbear
  FIXED_TAG: DROPBEAR_2020.81

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-build:
    name: Build Android ARM64 Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Clear Previous Cache and Old Files
        run: |
          rm -rf dropbear-src
          rm -f dropbear.tar.gz
          rm -f sshd_64

      - name: Download and Extract Dropbear Source
        run: |
          TAG="${{ env.FIXED_TAG }}"
          OWNER="${{ env.SRC_OWNER }}"
          REPO="${{ env.SRC_REPO }}"
          echo "Building Dropbear Tag: $TAG"
          # URL વેરિએબલ ફિક્સ: હવે કોઈ નેસ્ટેડ બ્રેસ એરર નહીં આવે
          curl -f -L "https://github.com{OWNER}/${REPO}/archive/refs/tags/${TAG}.tar.gz" -o dropbear.tar.gz
          tar -xzf dropbear.tar.gz
          mv "dropbear-${TAG}" dropbear-src

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install Build Dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Patch and Compile for Android ARM64
        run: |
          cd dropbear-src
          export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export AR=$TOOLCHAIN/bin/llvm-ar
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          export CFLAGS="-O2"
          export LDFLAGS="-static"

          # ==================== 100% કાયમી સોર્સ કોડ પેચ ====================
          
          # ૧. default_options.h માંથી પાસવર્ડ ઓથ પહેલેથી જ બંધ કરો
          sed -i 's/#define DROPBEAR_SVR_PASSWORD_AUTH 1/#define DROPBEAR_SVR_PASSWORD_AUTH 0/' default_options.h

          # ૨. cli-auth.c માં આવતી getpass() ની એરર ફિક્સ (એન્ડ્રોઇડ માટે કસ્ટમ ડમી ફંક્શન એડ કર્યું)
          sed -i '1s/^/char* getpass(const char* prompt) { return ""; }\n/' cli-auth.c

          # ૩. svr-auth.c માં એન્ડ્રોઇડમાં ન મળતા getusershell અને endusershell ફંક્શન્સને બાયપાસ કરો
          sed -i '1s/^/char* getusershell() { return "\/system\/bin\/sh"; }\nvoid endusershell() {}\n/' svr-auth.c

          # ================================================================

          autoreconf -fi
          
          ./configure --host=$TARGET \
            --disable-zlib \
            --disable-utmp \
            --disable-wtmp \
            --disable-lastlog \
            --disable-password-auth \
            --disable-pam \
            --enable-static \
            ac_cv_func_getpgrp_void=yes

          # ૪. configure ચાલ્યા પછી જનરેટ થતી sysoptions.h ની crypt એરર લાઈન કાઢી નાખો
          sed -i 's/#error "DROPBEAR_SVR_PASSWORD_AUTH requires `crypt()`.\"/\/\/ Password auth disabled/' sysoptions.h

          # ૫. NO-AUTHENTICATION BYPASS: કોઈ પણ કી કે પાસવર્ડ વગર સીધું કનેક્શન આપો (Always success)
          sed -i 's/if (auth_ans == DROPBEAR_SUCCESS)/if (1) \/\/ Always success/' svr-auth.c

          # બિલ્ડ પ્રોસેસ શરૂ કરો
          make PROGRAMS="dropbear dbclient dropbearkey" STATIC=1 MULTI=1 -j$(nproc)
          $STRIP dropbearmulti
          mv dropbearmulti ../sshd_64
          chmod +x ../sshd_64
          file ../sshd_64

      - uses: actions/upload-artifact@v4
        with:
          name: sshd_64-android-arm64
          path: sshd_64

      - name: Commit Binary
        run: |
          mkdir -p bin
          mv sshd_64 bin/
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bin/
          git commit -m "Update sshd_64 ${{ env.FIXED_TAG }} No-Password" || true
          git push
