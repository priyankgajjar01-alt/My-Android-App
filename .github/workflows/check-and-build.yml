name: Check and Build Android Dropbear
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '05 00 * * 1-5'

env:
  SRC_OWNER: mkj
  SRC_REPO: dropbear

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-build:
    name: Check Version & Build Android Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Latest Upstream Release Tag
        id: latest_release
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const query = `query release($owner:String!, $repo:String!) {
              repository(owner:$owner, name:$repo) {
                releases(first:1, orderBy:{field:CREATED_AT, direction:DESC}) {
                  nodes {
                    tagName
                  }
                }
              }
            }`
            const vars = { owner: process.env.SRC_OWNER, repo: process.env.SRC_REPO }
            const result = await github.graphql(query, vars)
            return result.repository.releases.nodes[0].tagName

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Download and Extract Dropbear Source
        run: |
          VERSION="${{ steps.latest_release.outputs.result }}"
          curl -L "https://github.com{VERSION}.tar.gz" -o dropbear.tar.gz
          tar -xzf dropbear.tar.gz
          mv dropbear-${VERSION} dropbear-src

      - name: Compile Cross-Platform Android Binary
        run: |
          cd dropbear-src
          export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21
          export CC=$TOOLCHAIN/bin/$TARGET$API-clang
          
          ./configure --host=$TARGET --disable-zlib --enable-static
          make MULTI=1 dropbearmulti
          
          cp dropbearmulti ../dropbear-android-aarch64

      - name: Create Update PR with Binary Asset
        uses: peter-evans/create-pull-request@v6
        with:
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "Update Dropbear Binary to ${{ steps.latest_release.outputs.result }}"
          title: "Update Dropbear to ${{ steps.latest_release.outputs.result }}"
          body: "Automated compile build for Android ARM64 utilizing version ${{ steps.latest_release.outputs.result }}."
          branch: update-version
