name: Check and Build Android Dropbear
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '05 00 * * 1-5'

env:
  SRC_OWNER: mkj
  SRC_REPO: dropbear

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-build:
    name: Check Version & Build Android Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Latest Upstream Release Tag
        id: latest_release
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const query = `query release($owner:String!, $repo:String!) {
              repository(owner:$owner, name:$repo) {
                releases(first:1, orderBy:{field:CREATED_AT, direction:DESC}) {
                  nodes {
                    tagName
                  }
                }
              }
            }`
            const vars = { owner: process.env.SRC_OWNER, repo: process.env.SRC_REPO }
            const result = await github.graphql(query, vars)
            
            if (result?.repository?.releases?.nodes?.length > 0) {
              return result.repository.releases.nodes[0].tagName;
            } else {
              throw new Error("Could not find any releases for this repository.");
            }

      - name: Save Version to Environment
        run: |
          echo "DROPBEAR_VER=${{ steps.latest_release.outputs.result }}" >> $GITHUB_ENV

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Download and Extract Dropbear Source
        run: |
          curl -L "https://github.com{DROPBEAR_VER}.tar.gz" -o dropbear.tar.gz
          tar -xzf dropbear.tar.gz
          mv "dropbear-${DROPBEAR_VER}" dropbear-src

      - name: Compile Cross-Platform Android Binary
        run: |
          cd dropbear-src
          export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21
          export CC=$TOOLCHAIN/bin/$TARGET$API-clang
          
          # Fix Android NDK compatibility breaks
          export CFLAGS="-O2 -Dcrypt=dropbear_crypt"
          
          ./configure --host=$TARGET --disable-zlib --disable-utmp --disable-wtmp --disable-lastlog --enable-static
          
          # Explicit compilation targets for multicall binaries
          make PROGRAM=dropbearmulti dropbearmulti
          
          cp dropbearmulti ../dropbear-android-aarch64

      - name: Create Update PR with Binary Asset
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "Update Dropbear Binary to ${{ env.DROPBEAR_VER }}"
          title: "Update Dropbear to ${{ env.DROPBEAR_VER }}"
          body: "Automated compile build for Android ARM64 utilizing version ${{ env.DROPBEAR_VER }}."
          branch: update-version
