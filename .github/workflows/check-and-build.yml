name: Check and Build Android Dropbear
on:
  push:
    paths-ignore:
      - 'bin/**' # bin માં commit થાય ત્યારે ફરીથી trigger ન થાય
  workflow_dispatch:

env:
  SRC_OWNER: mkj
  SRC_REPO: dropbear

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-build:
    name: Check Version & Build Android Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Latest Upstream Release Tag
        id: latest_release
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const query = `query release($owner:String!, $repo:String!) {
              repository(owner:$owner, name:$repo) {
                releases(first:1, orderBy:{field:CREATED_AT, direction:DESC}) {
                  nodes { tagName }
                }
              }
            }`
            const vars = { owner: process.env.SRC_OWNER, repo: process.env.SRC_REPO }
            const result = await github.graphql(query, vars)
            return result.repository.releases.nodes[0].tagName;

      - name: Download and Extract Dropbear Source
        run: |
          TAG="${{ steps.latest_release.outputs.result }}"
          echo "Building Dropbear Tag: $TAG"
          curl -f -L "https://github.com/${{ env.SRC_OWNER }}/${{ env.SRC_REPO }}/archive/refs/tags/${TAG}.tar.gz" -o dropbear.tar.gz
          tar -xzf dropbear.tar.gz
          mv "dropbear-${TAG}" dropbear-src

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Compile for Android ARM64
        run: |
          cd dropbear-src
          export TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=21
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export AR=$TOOLCHAIN/bin/llvm-ar
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          export CFLAGS="-O2 -Dcrypt=dropbear_crypt -DDISABLE_PAM -DDISABLE_SHADOW"
          export LDFLAGS="-static"

          autoreconf -fi
          
          ./configure --host=$TARGET \
            --disable-zlib \
            --disable-utmp \
            --disable-wtmp \
            --disable-lastlog \
            --disable-password-auth \
            --disable-pam \
            --disable-shadow \
            --enable-static \
            ac_cv_func_getpgrp_void=yes \
            ac_cv_lib_c_crypt=no

          make PROGRAMS="dropbear dbclient dropbearkey" STATIC=1 MULTI=1 -j$(nproc)
          $STRIP dropbearmulti
          mv dropbearmulti ../sshd_64
          chmod +x ../sshd_64
          file ../sshd_64

      - uses: actions/upload-artifact@v4
        with:
          name: sshd_64-android-arm64
          path: sshd_64
          compression-level: 0

      - name: Commit Binary
        run: |
          mkdir -p bin
          mv sshd_64 bin/
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bin/
          git commit -m "Update sshd_64 ${{ steps.latest_release.outputs.result }}" || true
          git push
